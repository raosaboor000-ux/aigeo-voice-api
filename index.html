<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AI Geo Voice Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
      }

      .app-shell {
        display: flex;
        width: 92vw;
        max-width: 1100px;
        min-height: 80vh;
        background: rgba(30, 41, 59, 0.65);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }

      /* ---- LEFT PANEL ---- */
      .left-panel {
        flex: 1 1 55%;
        display: flex;
        flex-direction: column;
        padding: 40px 36px 32px;
        overflow-y: auto;
      }

      .brand {
        margin-bottom: 28px;
      }
      .brand h1 {
        font-size: 1.55rem;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }
      .brand p {
        margin-top: 6px;
        font-size: 0.88rem;
        color: #94a3b8;
        line-height: 1.5;
      }

      .conversation {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .chat-card {
        background: rgba(51, 65, 85, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 14px;
        padding: 18px 20px 14px;
        transition: background 0.25s;
      }
      .chat-card:hover {
        background: rgba(51, 65, 85, 0.7);
      }

      .chat-card .label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .label-you    { color: #818cf8; }
      .label-assist { color: #34d399; }
      .label-status { color: #fbbf24; }

      .label-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        display: inline-block;
      }
      .label-you .label-dot    { background: #818cf8; }
      .label-assist .label-dot { background: #34d399; }
      .label-status .label-dot { background: #fbbf24; }

      .chat-card .content {
        font-size: 0.98rem;
        line-height: 1.6;
        color: #cbd5e1;
        min-height: 20px;
        word-break: break-word;
      }
      .chat-card .content:empty::after {
        content: '—';
        color: #475569;
      }

      .bottom-bar {
        margin-top: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .btn-end {
        padding: 10px 22px;
        font-size: 0.85rem;
        font-weight: 600;
        border: 1px solid rgba(248, 113, 113, 0.4);
        border-radius: 10px;
        background: rgba(248, 113, 113, 0.1);
        color: #fca5a5;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      .btn-end:hover {
        background: rgba(248, 113, 113, 0.2);
        border-color: rgba(248, 113, 113, 0.6);
      }
      .btn-end:disabled { opacity: 0.4; cursor: not-allowed; }

      audio {
        flex: 1;
        max-width: 260px;
        height: 36px;
        border-radius: 8px;
        opacity: 0.7;
      }

      /* ---- RIGHT PANEL ---- */
      .right-panel {
        flex: 0 0 340px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 32px;
        background: linear-gradient(180deg, rgba(99,102,241,0.07) 0%, rgba(52,211,153,0.05) 100%);
        border-left: 1px solid rgba(148, 163, 184, 0.1);
        position: relative;
      }

      /* avatar ring */
      .avatar-wrap {
        position: relative;
        width: 180px;
        height: 180px;
        margin-bottom: 36px;
      }
      .avatar-ring {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, #818cf8, #34d399, #60a5fa, #818cf8);
        padding: 4px;
        transition: transform 0.4s;
      }
      .avatar-ring.recording {
        animation: spin-ring 2.5s linear infinite;
      }
      @keyframes spin-ring {
        to { transform: rotate(360deg); }
      }
      .avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .avatar-inner svg {
        width: 100px;
        height: 100px;
      }

      /* pulse rings behind avatar while recording */
      .pulse-ring {
        position: absolute;
        top: 50%; left: 50%;
        width: 180px; height: 180px;
        border-radius: 50%;
        border: 2px solid rgba(129, 140, 248, 0.3);
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
        pointer-events: none;
      }
      .recording .pulse-ring:nth-child(1) {
        animation: pulse 2s ease-out infinite;
      }
      .recording .pulse-ring:nth-child(2) {
        animation: pulse 2s ease-out 0.6s infinite;
      }
      .recording .pulse-ring:nth-child(3) {
        animation: pulse 2s ease-out 1.2s infinite;
      }
      @keyframes pulse {
        0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.5; }
        100% { transform: translate(-50%,-50%) scale(1.7); opacity: 0; }
      }

      /* mic button */
      .mic-btn {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
        transition: transform 0.15s, box-shadow 0.2s, background 0.3s;
        position: relative;
        z-index: 2;
      }
      .mic-btn:hover {
        transform: scale(1.07);
        box-shadow: 0 6px 32px rgba(99, 102, 241, 0.55);
      }
      .mic-btn:active {
        transform: scale(0.95);
      }
      .mic-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }
      .mic-btn.recording {
        background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
        box-shadow: 0 4px 24px rgba(239, 68, 68, 0.45);
      }
      .mic-btn svg {
        width: 30px;
        height: 30px;
      }

      .mic-label {
        margin-top: 14px;
        font-size: 0.82rem;
        font-weight: 500;
        color: #94a3b8;
        text-align: center;
        min-height: 20px;
      }

      /* ---- RESPONSIVE ---- */
      @media (max-width: 780px) {
        .app-shell {
          flex-direction: column-reverse;
          min-height: auto;
          width: 96vw;
          border-radius: 18px;
        }
        .right-panel {
          flex: 0 0 auto;
          border-left: none;
          border-bottom: 1px solid rgba(148, 163, 184, 0.1);
          padding: 32px 20px 28px;
        }
        .left-panel {
          padding: 28px 20px 24px;
        }
        .avatar-wrap {
          width: 130px; height: 130px;
          margin-bottom: 24px;
        }
        .avatar-ring { width: 130px; height: 130px; }
        .pulse-ring  { width: 130px; height: 130px; }
        .avatar-inner svg { width: 68px; height: 68px; }
        .mic-btn { width: 60px; height: 60px; }
        .mic-btn svg { width: 26px; height: 26px; }
      }
    </style>
  </head>

  <body>
    <div class="app-shell">

      <!-- LEFT: conversation -->
      <div class="left-panel">
        <div class="brand">
          <h1>AI Geo Navigators<br>Voice Assistant</h1>
          <p>Ask about services, products, contact info, or GIS &amp; climate topics.</p>
        </div>

        <div class="conversation">
          <div class="chat-card">
            <div class="label label-you"><span class="label-dot"></span> You said</div>
            <div class="content" id="heard"></div>
          </div>
          <div class="chat-card">
            <div class="label label-assist"><span class="label-dot"></span> Assistant</div>
            <div class="content" id="answer"></div>
          </div>
          <div class="chat-card">
            <div class="label label-status"><span class="label-dot"></span> Status</div>
            <div class="content" id="status"></div>
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn-end" id="endSessionBtn">End session</button>
          <audio id="player" controls></audio>
        </div>
      </div>

      <!-- RIGHT: avatar + mic -->
      <div class="right-panel">
        <div class="avatar-wrap" id="avatarWrap">
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="avatar-ring" id="avatarRing">
            <div class="avatar-inner">
              <!-- friendly bot face -->
              <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="60" cy="60" r="56" fill="#334155"/>
                <rect x="30" y="28" width="60" height="52" rx="16" fill="#475569"/>
                <rect x="34" y="32" width="52" height="44" rx="13" fill="#1e293b"/>
                <!-- eyes -->
                <circle cx="45" cy="52" r="6" fill="#818cf8">
                  <animate attributeName="r" values="6;4;6" dur="3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="75" cy="52" r="6" fill="#34d399">
                  <animate attributeName="r" values="6;4;6" dur="3s" begin="0.3s" repeatCount="indefinite"/>
                </circle>
                <!-- mouth -->
                <path d="M44 66 Q60 78 76 66" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" fill="none">
                  <animate attributeName="d" values="M44 66 Q60 78 76 66;M44 68 Q60 72 76 68;M44 66 Q60 78 76 66" dur="4s" repeatCount="indefinite"/>
                </path>
                <!-- antenna -->
                <line x1="60" y1="28" x2="60" y2="14" stroke="#94a3b8" stroke-width="2.5"/>
                <circle cx="60" cy="12" r="4" fill="#818cf8">
                  <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
                </circle>
              </svg>
            </div>
          </div>
        </div>

        <button class="mic-btn" id="recordBtn" aria-label="Toggle recording">
          <svg id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </button>
        <div class="mic-label" id="micLabel">Tap to start recording</div>
      </div>

    </div>

    <script>
      const API = "http://localhost:8000";

      let mediaRecorder;
      let chunks = [];
      let sessionId =
        sessionStorage.getItem("voice_session_id") || crypto.randomUUID();
      sessionStorage.setItem("voice_session_id", sessionId);

      const recordBtn = document.getElementById("recordBtn");
      const endSessionBtn = document.getElementById("endSessionBtn");
      const heardEl = document.getElementById("heard");
      const answerEl = document.getElementById("answer");
      const statusEl = document.getElementById("status");
      const player = document.getElementById("player");
      const micLabel = document.getElementById("micLabel");
      const avatarRing = document.getElementById("avatarRing");
      const avatarWrap = document.getElementById("avatarWrap");
      const micIcon = document.getElementById("micIcon");

      function setRecordingUi(active) {
        if (active) {
          micIcon.innerHTML = `<rect x="6" y="6" width="12" height="12" rx="2"/>`;
          recordBtn.classList.add("recording");
          avatarRing.classList.add("recording");
          avatarWrap.classList.add("recording");
          micLabel.textContent = "Tap to stop recording";
        } else {
          micIcon.innerHTML = `<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>`;
          recordBtn.classList.remove("recording");
          avatarRing.classList.remove("recording");
          avatarWrap.classList.remove("recording");
          micLabel.textContent = "Tap to start recording";
        }
        recordBtn.disabled = false;
      }

      async function startRecordingWithOptionalGreeting() {
        recordBtn.disabled = true;
        endSessionBtn.disabled = true;
        let greetingPlayed = sessionStorage.getItem("greeting_played") === "1";
        if (!greetingPlayed) {
          statusEl.textContent = "Playing greeting…";
          micLabel.textContent = "Please wait…";
          let greetingText = "Hello! I'm the AI Geo Navigators assistant. After this message, please speak your question.";
          try {
            const gRes = await fetch(`${API}/greeting`);
            if (gRes.ok) {
              const g = await gRes.json();
              if (g.text) greetingText = g.text;
            }
          } catch (_) {}
          const sRes = await fetch(`${API}/speak`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: greetingText }),
          });
          if (!sRes.ok) {
            const txt = await sRes.text().catch(() => "");
            let msg = txt.slice(0, 1200);
            try {
              const j = JSON.parse(txt);
              if (j.detail) msg = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail);
            } catch (_) {}
            statusEl.textContent = `Greeting audio failed: ${msg}. You can still speak — starting mic…`;
          } else {
            const blob = await sRes.blob();
            player.src = URL.createObjectURL(blob);
            await player.play().catch(() => {});
            await new Promise((resolve) => {
              player.onended = resolve;
              player.onerror = resolve;
            });
          }
          sessionStorage.setItem("greeting_played", "1");
        }
        statusEl.textContent = "Listening… ask your question, then tap the mic to stop.";
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];

        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          const mimeType = mediaRecorder.mimeType || "audio/webm";
          const blob = new Blob(chunks, { type: mimeType });
          const ext =
            mimeType.includes("ogg") ? ".ogg"
            : mimeType.includes("webm") ? ".webm"
            : mimeType.includes("wav") ? ".wav"
            : mimeType.includes("mp4") ? ".mp4"
            : ".webm";

          statusEl.textContent = `Transcribing…`;
          micLabel.textContent = "Processing…";
          const formData = new FormData();
          formData.append("audio", blob, `question${ext}`);

          try {
            const tRes = await fetch(`${API}/transcribe`, {
              method: "POST",
              body: formData,
            });
            if (!tRes.ok) {
              const err = await tRes.json().catch(() => ({}));
              throw new Error(err.detail || `Transcribe HTTP ${tRes.status}`);
            }

            const tData = await tRes.json();
            heardEl.textContent = tData.text;
            statusEl.textContent = "Asking assistant…";

            const aRes = await fetch(`${API}/ask`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: tData.text, session_id: sessionId }),
            });
            if (!aRes.ok) {
              const err = await aRes.json().catch(() => ({}));
              throw new Error(err.detail || `Ask HTTP ${aRes.status}`);
            }

            const aData = await aRes.json();
            answerEl.textContent = aData.answer;
            statusEl.textContent = "Speaking…";

            const speakRes = await fetch(`${API}/speak`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: aData.answer }),
            });
            if (!speakRes.ok) {
              const txt = await speakRes.text().catch(() => "");
              let msg = txt.slice(0, 1200);
              try {
                const j = JSON.parse(txt);
                if (j.detail) msg = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail);
              } catch (_) {}
              throw new Error(`Speak HTTP ${speakRes.status}: ${msg}`);
            }

            const audioBlob = await speakRes.blob();
            player.src = URL.createObjectURL(audioBlob);
            await player.play();
            statusEl.textContent = "Done. Tap the mic for another question.";
          } catch (e) {
            statusEl.textContent = `Error: ${e.message || e}`;
          } finally {
            setRecordingUi(false);
            endSessionBtn.disabled = false;
          }
        };

        mediaRecorder.start();
        setRecordingUi(true);
      }

      let isRecording = false;
      recordBtn.onclick = async () => {
        if (!isRecording) {
          try {
            await startRecordingWithOptionalGreeting();
            isRecording = true;
          } catch (e) {
            statusEl.textContent = `Error: ${e.message || e}`;
            setRecordingUi(false);
            endSessionBtn.disabled = false;
          }
        } else {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
          isRecording = false;
          setRecordingUi(false);
        }
      };

      async function endSession() {
        try {
          await fetch(`${API}/session/end`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: sessionId }),
          });
        } catch (_) {}
        sessionId = crypto.randomUUID();
        sessionStorage.setItem("voice_session_id", sessionId);
        heardEl.textContent = "";
        answerEl.textContent = "";
        statusEl.textContent = "Session ended. New session started.";
        micLabel.textContent = "Tap to start recording";
        sessionStorage.removeItem("greeting_played");
      }

      endSessionBtn.onclick = () => endSession();

      window.addEventListener("pagehide", () => {
        try {
          const blob = new Blob([JSON.stringify({ session_id: sessionId })], {
            type: "application/json",
          });
          navigator.sendBeacon(`${API}/session/end`, blob);
        } catch (_) {}
      });
    </script>
  </body>
</html>
